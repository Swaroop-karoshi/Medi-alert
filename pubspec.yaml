name: medi_alert
description: Smart Medicine Reminder - production ready medicine management app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.0
  supabase_flutter: ^2.8.4
  flutter_local_notifications: ^17.2.4
  google_fonts: ^8.0.2
  android_alarm_manager_plus: ^4.0.5
  fl_chart: ^0.69.2
  intl: ^0.19.0
  uuid: ^4.5.1
  timezone: ^0.9.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  flutter_animate: ^4.5.0
  crypto: ^3.0.3
  permission_handler: ^11.3.1
  device_info_plus: ^11.1.0
  flutter_foreground_task: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.jpeg"

flutter:
  uses-material-design: true
  assets:
    - assets/
